name: Build & deploy to Cloudflare Pages

on:
  # Follow BBC data: rebuild every 30 minutes.
  schedule:
    - cron: "*/30 * * * *"
  # Rebuild on push to main.
  push:
    branches: [main]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Only one deploy at a time; let a newer run cancel an in-flight one.
concurrency:
  group: cf-pages
  cancel-in-progress: true

env:
  # Public URL becomes https://<this-name>.pages.dev — change here if desired.
  CF_PAGES_PROJECT: wc-knockout-jst

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate index.html (JST)
        run: node build.js

      - name: Deploy to Cloudflare Pages
        run: >-
          npx --yes wrangler@4 pages deploy public
          --project-name="$CF_PAGES_PROJECT"
          --branch=main
          --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
